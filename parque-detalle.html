<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>REDVERDE | Detalle del Parque</title>
  <meta name="description" content="Información detallada del parque.">

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <!-- Navigation -->
  <nav class="navbar">
    <a href="index.html" class="logo">
      <i class="fa-solid fa-leaf"></i> REDVERDE
    </a>
    <ul class="nav-links">
      <li><a href="index.html">Inicio</a></li>
      <li><a href="parques.html" style="color: var(--primary-color);">Parques</a></li>
      <li><a href="actividades.html">Actividades</a></li>
      <li><a href="reportes.html">Reportes</a></li>
      <li><a href="cuenta.html" class="btn btn-primary" style="padding: 0.5rem 1.5rem; color: white;">Cuenta</a></li>
    </ul>
  </nav>

  <!-- Park Details Section -->
  <section class="services" id="detalle-parque" style="padding-top: 8rem; min-height: calc(100vh - 200px);">
    <div class="section-header" style="text-align: left; max-width: 800px; margin: 0 auto;">
      <a href="parques.html" style="display: inline-block; margin-bottom: 1rem; color: var(--primary-color); font-weight: 500; text-decoration: none;"><i class="fa-solid fa-arrow-left"></i> Volver al directorio</a>
      <h2 id="park-name">Cargando parque...</h2>
    </div>
    
    <div id="park-content" style="max-width: 800px; margin: 2rem auto; background: var(--white); padding: 2.5rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: left; display: none;">
      <div style="display: grid; grid-template-columns: 1fr; gap: 1.5rem;">
        <div>
          <h3 style="color: var(--secondary-color); margin-bottom: 0.5rem;"><i class="fa-solid fa-location-dot"></i> Dirección</h3>
          <p id="park-address" style="color: var(--text-color); font-size: 1.05rem;"></p>
        </div>
        <div>
          <h3 style="color: var(--secondary-color); margin-bottom: 0.5rem;"><i class="fa-solid fa-clock"></i> Horario</h3>
          <p id="park-schedule" style="color: var(--text-color); font-size: 1.05rem;"></p>
        </div>
        <div>
          <h3 style="color: var(--secondary-color); margin-bottom: 0.5rem;"><i class="fa-solid fa-star-half-stroke"></i> Estado y Condición</h3>
          <p id="park-condition" style="color: var(--text-color); font-size: 1.05rem;"></p>
        </div>
        <div>
          <h3 style="color: var(--secondary-color); margin-bottom: 0.5rem;"><i class="fa-solid fa-dumbbell"></i> Equipamiento</h3>
          <div id="park-equipment" style="color: var(--text-color); font-size: 1.05rem;"></div>
        </div>
      </div>
    </div>
    <div id="loading-error" style="text-align: center; max-width: 800px; margin: 2rem auto; color: #ff6b6b; display: none;">
      <p>Error al cargar la información del parque.</p>
    </div>
  </section>

  <!-- Footer -->
  <footer id="footer">
    <div class="footer-content">
      <div class="footer-logo">
        <i class="fa-solid fa-leaf"></i> REDVERDE
      </div>
      <div class="social-links">
        <a href="#"><i class="fa-brands fa-instagram"></i></a>
        <a href="#"><i class="fa-brands fa-facebook"></i></a>
        <a href="#"><i class="fa-brands fa-twitter"></i></a>
        <a href="#"><i class="fa-brands fa-linkedin"></i></a>
      </div>
    </div>
    <div class="copyright">
      <p>&copy; 2026 REDVERDE. Todos los derechos reservados. Diseñado para un mundo mejor.</p>
    </div>
  </footer>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const urlParams = new URLSearchParams(window.location.search);
      const idParque = urlParams.get('id');
      
      const parkName = document.getElementById("park-name");
      const parkContent = document.getElementById("park-content");
      const loadingError = document.getElementById("loading-error");
      
      if (!idParque) {
        parkName.textContent = "Parque no especificado";
        loadingError.style.display = "block";
        return;
      }

      fetch(`http://localhost:3000/api/parques/${idParque}`)
        .then(response => {
          if (!response.ok) {
            throw new Error("Error en la red");
          }
          return response.json();
        })
        .then(parque => {
          parkName.textContent = parque.nombre;
          
          const direccionText = parque.direccion ? parque.direccion : "Dirección no disponible";
          const horarioText = parque.horario ? parque.horario : "Horario no disponible";
          
          const comentariosText = parque.comentarios ? `<br><small style="color: #666; margin-top: 0.5rem; display: block;"><strong>Comentarios:</strong> ${parque.comentarios}</small>` : "";
          const condicionText = parque.condicion ? `<span style="color: var(--primary-color); font-weight: 500;">${parque.condicion}</span> ${parque.nivel ? '(Nivel: ' + parque.nivel + ')' : ''}${comentariosText}` : "No evaluado";
          
          let equipamientoHtml = "<p>No registrado</p>";
          if (parque.equipamientos) {
              const items = parque.equipamientos.split(", ");
              equipamientoHtml = "<ul style='padding-left: 1.5rem; margin-top: 0.5rem;'>";
              items.forEach(item => {
                  equipamientoHtml += `<li>${item}</li>`;
              });
              equipamientoHtml += "</ul>";
          }
          
          document.getElementById("park-address").textContent = direccionText;
          document.getElementById("park-schedule").textContent = horarioText;
          document.getElementById("park-condition").innerHTML = condicionText;
          document.getElementById("park-equipment").innerHTML = equipamientoHtml;
          
          parkContent.style.display = "block";
        })
        .catch(error => {
          console.error("Error obteniendo detalles del parque:", error);
          parkName.textContent = "Parque no encontrado";
          loadingError.style.display = "block";
        });
    });
  </script>
</body>
</html>
